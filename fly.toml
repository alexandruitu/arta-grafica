app            = "arta-grafica"
primary_region = "lhr"

[env]
  DATA_DIR = "/data"
  PORT     = "8080"
  TZ       = "Europe/Bucharest"

[http_service]
  auto_start_machines  = true
  auto_stop_machines   = "stop"
  force_https          = true
  internal_port        = 8_080
  min_machines_running = 1

  [http_service.concurrency]
  type       = "requests"
  soft_limit = 20
  hard_limit = 25

[[mounts]]
  source       = "arta_grafica_data"
  destination  = "/data"
  initial_size = "3gb"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
